apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-analytics-cluster-gitops
  namespace: openshift-gitops
  labels:
    scope: cluster
    product: planning-analytics
spec:
  destination:
    name: ''
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: ''
    repoURL: https://howard-luo.github.io/non-olm-cp4d-gitops-530/repos
    targetRevision: ${planning-analytics-cluster-version}
    chart: ${planning-analytics-cluster-chart}
    helm:
      valuesObject:
        global:
          operatorNamespace: gitops-operator
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
